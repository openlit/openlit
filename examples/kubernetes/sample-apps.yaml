apiVersion: v1
kind: Secret
metadata:
  name: llm-api-keys
  namespace: openlit
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_ME"
  ANTHROPIC_API_KEY: "REPLACE_ME"
  GEMINI_API_KEY: "REPLACE_ME"
  AWS_BEARER_BEDROCK_TOKEN: "REPLACE_ME"
---
# OpenAI sample app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openai-app
  namespace: openlit
  labels:
    app: openai-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openai-app
  template:
    metadata:
      labels:
        app: openai-app
    spec:
      containers:
        - name: openai-app
          image: openlit-example-openai:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: OPENAI_API_KEY
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
# Anthropic sample app

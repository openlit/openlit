---
# Bedrock sample app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bedrock-app
  namespace: openlit
  labels:
    app: bedrock-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bedrock-app
  template:
    metadata:
      labels:
        app: bedrock-app
    spec:
      containers:
        - name: bedrock-app
          image: openlit-example-bedrock:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: AWS_BEARER_BEDROCK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: AWS_BEARER_BEDROCK_TOKEN
            - name: AWS_REGION
              value: "us-east-1"
            - name: BEDROCK_MODEL_ID
              value: "amazon.nova-micro-v1:0"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

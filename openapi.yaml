openapi: 3.0.3
info:
  title: OpenLIT Client API
  description: |
    API specification for the OpenLIT client application.
    This includes telemetry retrieval APIs (authorized via browser session or `OPENLIT_API_KEY`), prompt hub management, rule engine evaluation, and other controller/platform APIs.
  version: 1.23.0
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /api/telemetry/logs:
    post:
      summary: Query logs
      description: Retrieve a paginated list of telemetry logs matching the provided filters. Can be authenticated using session cookies or an API key.
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricParams'
      responses:
        '200':
          description: A list of logs and total count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
                    example: 150
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /api/telemetry/logs/{id}:
    get:
      summary: Get log detail by row ID
      description: Retrieve detail of a specific log entry by its hash/row ID.
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The cityHash64 row ID of the log.
          schema:
            type: string
      responses:
        '200':
          description: Log details retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/telemetry/logs/attribute-keys:
    post:
      summary: Query log attribute keys
      description: Retrieve unique attribute keys for log attributes, resource attributes, and scope attributes.
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                timeLimit:
                  $ref: '#/components/schemas/TimeLimit'
      responses:
        '200':
          description: Unique attribute keys.
          content:
            application/json:
              schema:
                type: object
                properties:
                  logAttributeKeys:
                    type: array
                    items:
                      type: string
                  resourceAttributeKeys:
                    type: array
                    items:
                      type: string
                  scopeAttributeKeys:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /api/telemetry/logs/config:
    post:
      summary: Query logs config options
      description: Retrieve configuration metadata such as available service names, severities, and total log rows.
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                timeLimit:
                  $ref: '#/components/schemas/TimeLimit'
      responses:
        '200':
          description: Configuration metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      type: string
                  severities:
                    type: array
                    items:
                      type: string
                  totalRows:
                    type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/telemetry/metrics:
    post:
      summary: Query metrics list
      description: Retrieve a list of aggregated metrics matching the filters.
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricParams'
      responses:
        '200':
          description: A list of metrics.
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /api/telemetry/metrics/{name}:
    post:
      summary: Get metric detail
      description: Retrieve time-series graph points and detail records for a specific metric name.
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: name
          in: path
          required: true
          description: The name of the metric.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                timeLimit:
                  $ref: '#/components/schemas/TimeLimit'
                metricType:
                  type: string
                serviceName:
                  type: string
                selectedConfig:
                  type: object
      responses:
        '200':
          description: Metric graph and data points.
          content:
            application/json:
              schema:
                type: object
                properties:
                  series:
                    type: array
                    items:
                      type: object
                  points:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/telemetry/metrics/attribute-keys:
    post:
      summary: Query metric attribute keys
      description: Retrieve unique attribute keys for metrics.
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                timeLimit:
                  $ref: '#/components/schemas/TimeLimit'
      responses:
        '200':
          description: Metric attributes keys.
          content:
            application/json:
              schema:
                type: object
                properties:
                  metricAttributeKeys:
                    type: array
                    items:
                      type: string
                  resourceAttributeKeys:
                    type: array
                    items:
                      type: string
                  scopeAttributeKeys:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/telemetry/metrics/config:
    post:
      summary: Query metrics configuration metadata
      description: Retrieve list of available services, metric names, types, and counts.
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                timeLimit:
                  $ref: '#/components/schemas/TimeLimit'
      responses:
        '200':
          description: Config metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      type: string
                  metricNames:
                    type: array
                    items:
                      type: string
                  metricTypes:
                    type: array
                    items:
                      type: string
                  totalRows:
                    type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/telemetry/summary/{signal}:
    post:
      summary: Query signal summary data
      description: Retrieve aggregated time-series summary bucketed counts and metrics (e.g. costs, latency, or token counts) for traces, exceptions, logs, or metrics.
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: signal
          in: path
          required: true
          description: The telemetry signal type.
          schema:
            type: string
            enum: [traces, exceptions, logs, metrics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                timeLimit:
                  $ref: '#/components/schemas/TimeLimit'
                selectedConfig:
                  type: object
      responses:
        '200':
          description: Aggregated summary stats bucketed by time interval.
          content:
            application/json:
              schema:
                type: object
                properties:
                  bucket:
                    type: string
                    example: hour
                  buckets:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
                  peak:
                    type: number
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /api/metrics/request:
    post:
      summary: Query traces list
      description: Retrieve a paginated list of trace spans matching the provided filters. Can be authenticated using session cookies or an API key.
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricParams'
      responses:
        '200':
          description: A list of traces and total count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /api/metrics/exception:
    post:
      summary: Query exceptions list
      description: Retrieve a paginated list of exceptions matching the provided filters. Can be authenticated using session cookies or an API key.
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricParams'
      responses:
        '200':
          description: A list of exceptions and total count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /api/api-key:
    get:
      summary: List all API Keys
      description: Retrieve all API keys associated with the user's active database configuration.
      security:
        - CookieAuth: []
      responses:
        '200':
          description: A list of API Keys.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKey'
    post:
      summary: Generate an API Key
      description: Create a new API key prefixed with `openlit-` linked to the active database configuration.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: my-sdk-key
      responses:
        '200':
          description: API key created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey:
                    type: string
                    example: openlit-uHpx834Jsa...
                  databaseConfigId:
                    type: string
                    example: db-config-id
        '400':
          description: Bad Request.

  /api/api-key/{id}:
    delete:
      summary: Delete an API Key
      description: Mark an API key as deleted.
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '400':
          description: Bad request or key not found.

  /api/db-config:
    get:
      summary: List database configurations
      description: Retrieve database configurations the current user has access to.
      security:
        - CookieAuth: []
      responses:
        '200':
          description: Database configurations list.
    post:
      summary: Save database configuration
      description: Create or update a ClickHouse database configuration connection parameters.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - host
                - port
                - username
                - password
              properties:
                host:
                  type: string
                port:
                  type: integer
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Saved successfully.

  /api/prompt:
    post:
      summary: Create a prompt
      description: Create a new prompt entry or version.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptInput'
      responses:
        '200':
          description: Prompt created successfully.

  /api/prompt/get:
    post:
      summary: Retrieve a prompt by name or ID
      description: Retrieve details of a prompt version.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Prompt details.

  /api/prompt/get-compiled:
    get:
      summary: Fetch compiled prompt
      description: Fetch and compile a prompt by name with dynamic variable interpolation. Does not require browser session cookie if authenticated by API key.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Compiled prompt text.

  /api/vault/get-secrets:
    get:
      summary: Fetch secrets from Vault
      description: Safely retrieve API keys or credentials stored in the OpenLIT Vault.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Key-value secrets retrieved.

  /api/rule-engine/evaluate:
    post:
      summary: Evaluate rule engine config
      description: Evaluate rules (e.g. redaction, prompts, guardrails) against inputs.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Rules evaluated.

  /api/controller/poll:
    post:
      summary: Controller poll heartbeat
      description: Heartbeat and state synchronization endpoint for OpenLIT controllers.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Acknowledged.

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: Standard NextAuth browser session token cookie.
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: OPENLIT_API_KEY
      description: Bearer token format (`Authorization: Bearer openlit-...`).

  schemas:
    TimeLimit:
      type: object
      required:
        - start
        - end
        - type
      properties:
        start:
          type: string
          format: date-time
          example: '2026-07-01T00:00:00.000Z'
        end:
          type: string
          format: date-time
          example: '2026-07-02T00:00:00.000Z'
        type:
          type: string
          enum: [24H, 7D, 1M, 3M, CUSTOM]
          example: 24H

    MetricParams:
      type: object
      required:
        - timeLimit
      properties:
        timeLimit:
          $ref: '#/components/schemas/TimeLimit'
        limit:
          type: integer
          default: 25
          example: 50
        offset:
          type: integer
          default: 0
          example: 0
        selectedConfig:
          type: object
          properties:
            models:
              type: array
              items:
                type: string
            providers:
              type: array
              items:
                type: string
            serviceNames:
              type: array
              items:
                type: string
            environments:
              type: array
              items:
                type: string
        sorting:
          type: object
          properties:
            type:
              type: string
              example: Timestamp
            direction:
              type: string
              enum: [asc, desc]
              example: desc

    PromptInput:
      type: object
      required:
        - name
        - prompt
      properties:
        name:
          type: string
        prompt:
          type: string
        version:
          type: string
        status:
          type: string
        tags:
          type: array
          items:
            type: string
        metaProperties:
          type: object

    ApiKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        apiKey:
          type: string
        createdAt:
          type: string
          format: date-time

  responses:
    UnauthorizedError:
      description: Authentication failed or credentials missing.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Unauthorized
    BadRequestError:
      description: Invalid request parameters or body.
      content:
        application/json:
          schema:
            type: string
            example: Start date or End date missing!

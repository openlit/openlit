name: openlit CLI Release

on:
  push:
    tags:
      - 'cli-*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (cli-X.Y.Z)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: amd64,  ext: ""    }
          - { os: linux,   arch: arm64,  ext: ""    }
          - { os: darwin,  arch: amd64,  ext: ""    }
          - { os: darwin,  arch: arm64,  ext: ""    }
          - { os: windows, arch: amd64,  ext: ".exe" }
          - { os: windows, arch: arm64,  ext: ".exe" }
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          check-latest: true
      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/cli-}" >> $GITHUB_OUTPUT
            echo "VERSION=${{ github.event.inputs.tag }}" | sed 's/cli-//' >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/cli-}" >> $GITHUB_OUTPUT
          fi
      - name: Build
        working-directory: ./cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          VERSION="${{ steps.ver.outputs.VERSION }}"
          COMMIT="$(git rev-parse --short HEAD)"
          go build -trimpath -ldflags "-s -w -X main.Version=$VERSION -X main.Commit=$COMMIT" \
            -o dist/openlit-${GOOS}-${GOARCH}${{ matrix.ext }} ./cmd/openlit
      - name: Package
        working-directory: ./cli
        run: |
          NAME="openlit-${{ matrix.os }}-${{ matrix.arch }}"
          BIN="dist/${NAME}${{ matrix.ext }}"
          cd dist
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip "${NAME}.zip" "$(basename "$BIN")" ../README.md ../../LICENSE
            sha256sum "${NAME}.zip" > "${NAME}.zip.sha256"
          else
            tar -czf "${NAME}.tar.gz" "$(basename "$BIN")" -C ../ README.md -C ../../ LICENSE
            sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: openlit-${{ matrix.os }}-${{ matrix.arch }}
          path: cli/dist/*

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Resolve version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/cli-}" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;
          ls -la release
      - uses: softprops/action-gh-release@v3
        with:
          name: openlit CLI v${{ steps.ver.outputs.VERSION }}
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Container image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/cli-}" >> $GITHUB_OUTPUT
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cli/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.ver.outputs.VERSION }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/openlit-cli:${{ steps.ver.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/openlit-cli:latest

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - name: Resolve version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/cli-}" >> $GITHUB_OUTPUT
      - name: Update tap formula
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: openlit/homebrew-openlit
          formula: openlit
          tag: cli-${{ steps.ver.outputs.VERSION }}

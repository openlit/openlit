name: TypeScript Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'sdk/typescript/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'sdk/typescript/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20"]
    defaults:
      run:
        working-directory: sdk/typescript

    steps:
    - name: Checkout base code
      uses: actions/checkout@v6

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build TypeScript
      run: npm run build

    - name: Jest
      run: npm test

name: OTel GPU Collector Tests

on:
  push:
    branches: ["main"]
    paths:
      - 'opentelemetry-gpu-collector/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'opentelemetry-gpu-collector/**'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: opentelemetry-gpu-collector/go.mod
          cache-dependency-path: opentelemetry-gpu-collector/go.sum

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang llvm libbpf-dev
          # Download static bpftool binary from libbpf/bpftool releases — avoids
          # linux-tools-$(uname -r) which fails on azure/custom kernels.
          BPFTOOL_VERSION=$(curl -fsSL https://api.github.com/repos/libbpf/bpftool/releases/latest \
            | jq -r .tag_name)
          curl -fsSL "https://github.com/libbpf/bpftool/releases/download/${BPFTOOL_VERSION}/bpftool-${BPFTOOL_VERSION}-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin/
          sudo chmod +x /usr/local/bin/bpftool
          bpftool version

      - name: Generate eBPF objects
        working-directory: opentelemetry-gpu-collector
        run: make setup-bpf generate

      - name: Run tests
        working-directory: opentelemetry-gpu-collector
        run: go test ./...

      # Cross-compile matrix: confirm the collector builds for every supported
      # GOOS/GOARCH after `make generate` has produced the per-arch eBPF
      # bindings. CGO_ENABLED=0 keeps the cross-builds reproducible without
      # installing arch-specific C toolchains; NVML/eBPF paths fall back to
      # their build-tagged stubs on unsupported targets.
      - name: Cross-compile linux/arm64 (eBPF path)
        working-directory: opentelemetry-gpu-collector
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: go build ./...

      - name: Cross-compile linux/riscv64 (stub fallback)
        working-directory: opentelemetry-gpu-collector
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: riscv64
        run: go build ./...

      - name: Cross-compile linux/ppc64le (stub fallback)
        working-directory: opentelemetry-gpu-collector
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ppc64le
        run: go build ./...

      - name: Cross-compile darwin/amd64 (stub fallback)
        working-directory: opentelemetry-gpu-collector
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: amd64
        run: go build ./...

      - name: Cross-compile darwin/arm64 (stub fallback)
        working-directory: opentelemetry-gpu-collector
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: go build ./...

      - name: Cross-compile windows/amd64 (stub fallback)
        working-directory: opentelemetry-gpu-collector
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: go build ./...

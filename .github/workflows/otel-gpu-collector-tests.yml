name: OTel GPU Collector Tests

on:
  push:
    branches: ["main"]
    paths:
      - 'opentelemetry-gpu-collector/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'opentelemetry-gpu-collector/**'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: opentelemetry-gpu-collector/go.mod
          cache-dependency-path: opentelemetry-gpu-collector/go.sum

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang llvm libbpf-dev
          # Install bpftool: try kernel-specific, then azure meta, then generic
          sudo apt-get install -y linux-tools-$(uname -r) 2>/dev/null || \
            sudo apt-get install -y linux-tools-azure 2>/dev/null || \
            sudo apt-get install -y linux-tools-generic
          # Symlink to a stable path regardless of which package installed it
          BPFTOOL=$(find /usr/lib/linux-tools -name bpftool 2>/dev/null | head -1)
          [ -n "$BPFTOOL" ] && sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool
          echo "bpftool: $(bpftool version 2>&1 | head -1)"
          echo "BTF file: $(ls -la /sys/kernel/btf/vmlinux 2>/dev/null || echo 'NOT FOUND')"

      - name: Generate vmlinux.h from kernel BTF
        run: |
          bpftool btf dump file /sys/kernel/btf/vmlinux format c \
            > opentelemetry-gpu-collector/internal/ebpf/bpf/vmlinux.h
          echo "vmlinux.h: $(wc -l < opentelemetry-gpu-collector/internal/ebpf/bpf/vmlinux.h) lines"

      - name: Copy libbpf headers and generate eBPF objects
        working-directory: opentelemetry-gpu-collector
        run: |
          cp /usr/include/bpf/bpf_helpers.h    internal/ebpf/bpf/
          cp /usr/include/bpf/bpf_helper_defs.h internal/ebpf/bpf/
          cp /usr/include/bpf/bpf_tracing.h    internal/ebpf/bpf/
          cp /usr/include/bpf/bpf_core_read.h  internal/ebpf/bpf/ 2>/dev/null || true
          cp /usr/include/bpf/bpf_endian.h     internal/ebpf/bpf/ 2>/dev/null || true
          make generate

      - name: Run tests
        working-directory: opentelemetry-gpu-collector
        run: go test ./...

name: OpenLIT Controller Tests

on:
  push:
    branches: ["main"]
    paths:
      - 'openlit-controller/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'openlit-controller/**'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: openlit-controller/go.mod
          cache-dependency-path: openlit-controller/go.sum

      - name: Install eBPF build dependencies
        # Pin bpftool rather than resolving "latest" via the unauthenticated
        # GitHub API (60/hour shared with other runners, and the response is
        # silent on rate-limit -- `jq -r .tag_name` returns "null" and the
        # subsequent download 404s, taking the whole step down). Pinning
        # also keeps tests reproducible against a known toolchain.
        env:
          BPFTOOL_VERSION: v7.5.0
        run: |
          set -euo pipefail
          sudo apt-get update -q
          sudo apt-get install -y clang llvm libbpf-dev
          # GitHub release-assets occasionally return transient 504s; retry before
          # piping into tar (a truncated body produces a misleading gzip error).
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 \
            "https://github.com/libbpf/bpftool/releases/download/${BPFTOOL_VERSION}/bpftool-${BPFTOOL_VERSION}-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin/
          sudo chmod +x /usr/local/bin/bpftool
          /usr/local/bin/bpftool version

      - name: Generate eBPF objects
        working-directory: openlit-controller
        run: make setup-bpf generate

      - name: Run tests
        working-directory: openlit-controller
        run: go test -race -count=1 ./...

      - name: Lint
        working-directory: openlit-controller
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

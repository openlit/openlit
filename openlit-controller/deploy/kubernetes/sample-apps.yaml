apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-openai-app
  namespace: openlit
  labels:
    app: demo-openai-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-openai-app
  template:
    metadata:
      labels:
        app: demo-openai-app
    spec:
      containers:
        - name: app
          image: demo-openai-app:local
          imagePullPolicy: IfNotPresent
          env:
            - name: OPENAI_API_KEY
              value: "demo-key"
---

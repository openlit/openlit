apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: openlit-controller
  namespace: openlit
  labels:
    app: openlit-controller
spec:
  selector:
    matchLabels:
      app: openlit-controller
  template:
    metadata:
      labels:
        app: openlit-controller
    spec:
      serviceAccountName: openlit-controller
      hostPID: true
      containers:
        - name: controller
          image: ghcr.io/openlit/openlit-controller:latest
          args: ["--config", "/etc/openlit-controller/config.yaml"]
          env:
            - name: OPENLIT_PROC_ROOT
              value: "/host/proc"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: bpf
              mountPath: /sys/fs/bpf
            - name: config
              mountPath: /etc/openlit-controller
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
        - name: config
          configMap:
            name: openlit-controller-config
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists

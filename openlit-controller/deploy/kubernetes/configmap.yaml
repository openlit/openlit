apiVersion: v1
kind: ConfigMap
metadata:
  name: openlit-controller-config
  namespace: openlit
data:
  config.yaml: |
    openlit_url: "http://openlit.openlit.svc.cluster.local:3000"
    obi_binary_path: "/usr/local/bin/obi"
    otlp_endpoint: "http://otel-collector.openlit.svc.cluster.local:4318"
    poll_interval: 2s

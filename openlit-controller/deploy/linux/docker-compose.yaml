# Infrastructure only — the controller and sample apps run on the host
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.4.1
    container_name: openlit-clickhouse
    environment:
      CLICKHOUSE_PASSWORD: OPENLIT
      CLICKHOUSE_USER: default
      CLICKHOUSE_DATABASE: openlit
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=default --password=OPENLIT --query='SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    restart: always

  openlit:
    image: openlit:local
    build:
      context: ../../../src
      dockerfile: Dockerfile
    container_name: openlit
    environment:
      INIT_DB_HOST: clickhouse
      INIT_DB_PORT: "8123"
      INIT_DB_DATABASE: openlit
      INIT_DB_USERNAME: default
      INIT_DB_PASSWORD: OPENLIT
      SQLITE_DATABASE_URL: file:/app/client/data/data.db
    ports:
      - "3000:3000"
      - "4318:4318"
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - openlit-data:/app/client/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

volumes:
  clickhouse-data:
  openlit-data:
